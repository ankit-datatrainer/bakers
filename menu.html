<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse Fancy Baker's full menu — 36+ artisan breads, cakes, pastries, cookies, donuts, sandwiches and beverages with online ordering.">
<title>Full Menu — Fancy Baker</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script defer src="js/data.js"></script>
<script defer src="js/app.js"></script>
<script defer src="js/animations.js"></script>
</head>
<body data-page="menu">

<section class="page-hero">
  <div class="container">
    <span class="eyebrow">Our menu</span>
    <h1>Baked fresh, priced fair</h1>
    <p>Everything below is baked this morning. Filter by category or sort by price to find your perfect treat.</p>
  </div>
</section>

<section class="section" style="padding-top:44px">
  <div class="container">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="sort-row">
      <select id="sort-select" aria-label="Sort items">
        <option value="featured">Sort: Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
      </select>
      <span id="menu-count" style="align-self:center;font-size:0.88rem;color:var(--brown-muted);font-weight:600"></span>
    </div>
    <div class="card-grid" id="menu-grid"></div>
  </div>
</section>

</body>
</html>
