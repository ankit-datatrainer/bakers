<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Your cart and checkout — Grace Bakers online ordering with delivery all over Delhi.">
<title>Cart &amp; Checkout — Grace Bakers</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script defer src="js/data.js"></script>
<script defer src="js/app.js"></script>
<script defer src="js/animations.js"></script>
</head>
<body data-page="order">

<section class="page-hero">
  <div class="container">
    <span class="eyebrow">Almost there</span>
    <h1>Your basket &amp; checkout</h1>
    <p>Free delivery on orders above ₹499. Cash on delivery and UPI accepted.</p>
  </div>
</section>

<section class="section" style="padding-top:40px">
  <div class="container cart-layout">
    <div id="cart-lines"></div>
    <div class="panel">
      <h3>Order summary</h3>
      <div class="summary-row"><span>Subtotal</span><span id="sum-sub">₹0</span></div>
      <div class="summary-row"><span>Delivery</span><span id="sum-del">₹0</span></div>
      <div class="summary-row"><span>GST (5%)</span><span id="sum-gst">₹0</span></div>
      <div class="summary-row total"><span>Total</span><span id="sum-total">₹0</span></div>

      <form id="checkout-form" class="form-grid" style="margin-top:24px">
        <div class="field"><label for="co-name">Full name</label><input id="co-name" required placeholder="Aarav Mehta"></div>
        <div class="field"><label for="co-phone">Phone</label><input id="co-phone" type="tel" required pattern="[0-9+ -]{10,}" placeholder="+91 98xxxxxx00"></div>
        <div class="field"><label for="co-addr">Delivery address</label><textarea id="co-addr" required placeholder="House no., street, area — anywhere in Delhi"></textarea></div>
        <div class="field"><label for="co-pay">Payment method</label>
          <select id="co-pay"><option>UPI</option><option>Cash on Delivery</option><option>Credit / Debit Card</option></select>
        </div>
        <button class="btn btn-primary btn-block" type="submit">Place Order</button>
      </form>
    </div>
  </div>
</section>

</body>
</html>
